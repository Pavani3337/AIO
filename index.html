<!-- index.html -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Study Assistant Dashboard</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

</head>
<body>

<div class="container">

    <h1>🧠 AI Study Assistant Dashboard</h1>

    <!-- DASHBOARD -->
    <div class="dashboard">

        <div class="card">
            <h2 id="studyStreak">0</h2>
            <p>🔥 Study Streak</p>
        </div>

        <div class="card">
            <h2 id="completedTasks">0</h2>
            <p>✅ Completed Tasks</p>
        </div>

        <div class="card">
            <h2 id="focusSessions">0</h2>
            <p>⏳ Focus Sessions</p>
        </div>

    </div>

    <!-- TASK SECTION -->
    <div class="section">

        <h2>📅 Study Planner</h2>

        <input id="taskInput" placeholder="Enter Study Task">

        <select id="subjectSelect">
            <option>DBMS</option>
            <option>React</option>
            <option>JavaScript</option>
            <option>UPSC History</option>
            <option>Mathematics</option>
        </select>

        <button onclick="addTask()">Add Task</button>

        <div id="taskList"></div>

    </div>

    <!-- TIMER -->
    <div class="section">

        <h2>⏳ Pomodoro Timer</h2>

        <div id="timer">25:00</div>

        <button onclick="startTimer()">Start</button>
        <button onclick="pauseTimer()">Pause</button>
        <button onclick="resetTimer()">Reset</button>

    </div>

    <!-- NOTES -->
    <div class="section">

        <h2>📝 Quick Notes</h2>

        <textarea id="noteInput" placeholder="Write quick note..."></textarea>

        <button onclick="saveNote()">Save Note</button>

        <div id="notesContainer"></div>

    </div>

    <!-- ANALYTICS -->
    <div class="section">

        <h2>📊 Study Analytics</h2>

        <canvas id="studyChart"></canvas>

    </div>

    <!-- WEAK SUBJECT -->
    <div class="section">

        <h2>⚠ Weak Subject Detection</h2>

        <p id="weakSubject">No weak subjects detected</p>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
