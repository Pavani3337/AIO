<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AI Study Assistant</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

</head>
<body>

<!-- HOME SCREEN -->
<div id="homeScreen">

    <h1>🧠 AI Study Assistant</h1>

    <div class="addSubject">
        <input id="subjectInput" placeholder="Enter Subject Name">
        <button onclick="addSubject()">Add Subject</button>
    </div>

<input
    id="searchSubject"
    placeholder="🔍 Search Subject"
    onkeyup="renderSubjects()"
>

    <div id="subjectsContainer"></div>

</div>

<!-- DASHBOARD -->
<div id="dashboardScreen" style="display:none;">

    <button onclick="goHome()">⬅ Back</button>

    <h1 id="subjectTitle"></h1>

    <div class="dashboard">

        <div class="card">
            <h2 id="taskCount">0</h2>
            <p>✅ Completed Tasks</p>
        </div>

        <div class="card">
            <h2 id="sessionCount">0</h2>
            <p>⏳ Sessions</p>
        </div>

        <div class="card">
            <h2 id="streakCount">0</h2>
            <p>🔥 Study Streak</p>
        </div>

    </div>

    <!-- TASKS -->
    <div class="section">
        <h2>📅 Tasks</h2>

        <input id="taskInput" placeholder="Enter Study Task">
        <button onclick="addTask()">Add Task</button>

<input
id="taskSearch"
placeholder="🔍 Search Task"
onkeyup="renderTasks()">

        <div id="taskList"></div>
    </div>

    <!-- TIMER -->
    <div class="section">

        <h2>⏳ Pomodoro Timer</h2>

        <div id="timer">25:00</div>

        <button onclick="startTimer()">Start</button>
        <button onclick="pauseTimer()">Pause</button>
        <button onclick="resetTimer()">Reset</button>

    </div>

    <!-- NOTES -->
    <div class="section">

        <h2>📝 Notes</h2>

        <textarea id="noteInput" placeholder="Write notes..."></textarea>
        <button onclick="saveNote()">Save Note</button>


<input
id="noteSearch"
placeholder="🔍 Search Notes"
onkeyup="renderNotes()">


        <div id="notesContainer"></div>

    </div>

    <!-- CHART -->
    <div class="section">
        <h2>📊 Progress Analytics</h2>
        <canvas id="chart"></canvas>
    </div>

</div>

<script src="script.js"></script>

</body>
</html>
