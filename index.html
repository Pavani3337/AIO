<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AI Study Assistant</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

</head>

<body>

<!-- ========================= -->
<!-- HOME SCREEN -->
<!-- ========================= -->

<div id="homeScreen">

    <h1>🧠 AI Study Assistant</h1>

    <div class="addSubject">

        <input
            id="subjectInput"
            placeholder="Enter Subject Name">

        <button onclick="addSubject()">
            Add Subject
        </button>

    </div>

    <div id="subjectsContainer"></div>

</div>

<!-- ========================= -->
<!-- MAIN TASK SCREEN -->
<!-- ========================= -->

<div id="mainTaskScreen" style="display:none;">

    <button onclick="goHome()">
        ⬅ Back
    </button>

    <h1 id="mainTaskTitle"></h1>

    <div class="dashboard">

        <div class="card">
            <h2 id="taskCount">0</h2>
            <p>✅ Completed Subtasks</p>
        </div>

        <div class="card">
            <h2 id="sessionCount">0</h2>
            <p>⏳ Sessions</p>
        </div>

        <div class="card">
            <h2 id="streakCount">0</h2>
            <p>🔥 Study Streak</p>
        </div>

    </div>

    <!-- MAIN TASKS -->

    <div class="section">

        <h2>📂 Main Tasks</h2>

        <input
            id="mainTaskInput"
            placeholder="Enter Main Task">

        <button onclick="addMainTask()">
            Add Main Task
        </button>

        <div id="mainTaskList"></div>

    </div>

    <!-- TIMER -->

    <div class="section">

        <h2>⏳ Pomodoro Timer</h2>

        <div id="timer">25:00</div>

        <button onclick="startTimer()">Start</button>
        <button onclick="pauseTimer()">Pause</button>
        <button onclick="resetTimer()">Reset</button>

    </div>

    <!-- NOTES -->

    <div class="section">

        <h2>📝 Notes</h2>

        <textarea
            id="noteInput"
            placeholder="Write notes..."></textarea>

        <button onclick="saveNote()">
            Save Note
        </button>

        <div id="notesContainer"></div>

    </div>

    <!-- CHART -->

    <div class="section">

        <h2>📊 Progress Analytics</h2>

        <canvas id="chart"></canvas>

    </div>

</div>

<!-- ========================= -->
<!-- SUBTASK SCREEN -->
<!-- ========================= -->

<div id="subTaskScreen" style="display:none;">

    <button onclick="backToMainTasks()">
        ⬅ Back
    </button>

    <h1 id="subTaskTitle"></h1>

    <div class="section">

        <h2>✅ Subtasks</h2>

        <input
            id="subTaskInput"
            placeholder="Enter Subtask">

        <button onclick="addSubTask()">
            Add Subtask
        </button>

        <div id="subTaskList"></div>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
